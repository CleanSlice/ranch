apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ranch-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CleanSlice/ranch.git
    targetRevision: main
    path: k8s/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---

apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: agent-deployment
  namespace: agents
spec:
  entrypoint: deploy-agent
  serviceAccountName: workflow
  arguments:
    parameters:
      - name: agent-id
      - name: agent-name
      - name: template-id
      - name: agent-image
      - name: agent-config
        value: "{}"
      - name: cpu-limit
        value: "500m"
      - name: memory-limit
        value: "512Mi"
      - name: bridle-url
        value: "http://host.k3d.internal:3333"
      - name: bridle-api-key
        value: "dev-bridle-api-key-change-me"
      - name: claude-code-oauth-token
        value: ""
      - name: anthropic-api-key
        value: ""
  templates:
    - name: deploy-agent
      steps:
        - - name: run-agent
            template: agent-pod

    - name: agent-pod
      resource:
        action: create
        successCondition: status.phase == Running
        failureCondition: status.phase == Failed
        manifest: |
          apiVersion: v1
          kind: Pod
          metadata:
            name: "agent-{{workflow.parameters.agent-id}}"
            namespace: agents
            labels:
              app: ranch-agent
              ranch/agent-id: "{{workflow.parameters.agent-id}}"
              ranch/template-id: "{{workflow.parameters.template-id}}"
          spec:
            restartPolicy: Never
            containers:
              - name: agent
                image: "{{workflow.parameters.agent-image}}"
                imagePullPolicy: IfNotPresent
                env:
                  - name: AGENT_ID
                    value: "{{workflow.parameters.agent-id}}"
                  - name: AGENT_NAME
                    value: "{{workflow.parameters.agent-name}}"
                  - name: AGENT_CONFIG
                    value: "{{workflow.parameters.agent-config}}"
                  - name: BRIDLE_URL
                    value: "{{workflow.parameters.bridle-url}}"
                  - name: BRIDLE_API_KEY
                    value: "{{workflow.parameters.bridle-api-key}}"
                  - name: BRIDLE_BOT_ID
                    value: "{{workflow.parameters.agent-id}}"
                  - name: CLAUDE_CODE_OAUTH_TOKEN
                    value: "{{workflow.parameters.claude-code-oauth-token}}"
                  - name: ANTHROPIC_API_KEY
                    value: "{{workflow.parameters.anthropic-api-key}}"
                resources:
                  requests:
                    cpu: "{{workflow.parameters.cpu-limit}}"
                    memory: "{{workflow.parameters.memory-limit}}"
                  limits:
                    cpu: "{{workflow.parameters.cpu-limit}}"
                    memory: "{{workflow.parameters.memory-limit}}"

apiVersion: v1
kind: ServiceAccount
metadata:
  name: workflow
  namespace: agents
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workflow
  namespace: agents
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # RLM executor runs use a native batch/v1 Job (see
  # api/src/slices/rlm/data/rlm-job.manifest.ts) instead of a bare Pod like
  # agent deploys - Argo's `resource: create/delete` action still needs
  # these verbs on Jobs to manage them.
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["argoproj.io"]
    resources:
      - workflows
      - workflows/finalizers
      - workflowtasksets
      - workflowtasksets/finalizers
      - workflowtaskresults
      - workflowtemplates
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workflow
  namespace: agents
subjects:
  - kind: ServiceAccount
    name: workflow
    namespace: agents
roleRef:
  kind: Role
  name: workflow
  apiGroup: rbac.authorization.k8s.io

name: cleanslice-ranch

# MinIO is attached to the k3d cluster's docker network (`k3d-ranch`) so
# that bot pods running inside k3d can resolve the hostname
# `cleanslice-ranch-minio-1`. The `k3d` network is declared external —
# it must exist before compose runs (created by `k3d cluster create ranch`).
services:
  postgres-local:
    image: postgres:17
    container_name: ranch-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ranch-local
    volumes:
      - ./docker/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./docker/minio:/data
    command: server /data --console-address ":9001"
    networks:
      - default
      - k3d
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/ranch-agent-data --ignore-existing;
      mc mb local/ranch-reins-sources --ignore-existing;
      exit 0;
      "

  lightrag-postgres:
    image: shangor/postgres-for-rag:v1.0
    container_name: ranch-lightrag-postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: lightrag
      POSTGRES_PASSWORD: lightrag
      POSTGRES_DB: lightrag
    volumes:
      - ./docker/lightrag-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lightrag']
      interval: 5s
      timeout: 5s
      retries: 5

  lightrag:
    image: ghcr.io/hkuds/lightrag:latest
    container_name: ranch-lightrag
    ports:
      - '9621:9621'
    environment:
      LIGHTRAG_API_KEY: ${LIGHTRAG_API_KEY:-dev-secret-change-me}
      LLM_BINDING: openai
      LLM_MODEL: gpt-4o-mini
      LLM_BINDING_API_KEY: ${OPENAI_API_KEY}
      EMBEDDING_BINDING: openai
      EMBEDDING_MODEL: text-embedding-3-small
      EMBEDDING_BINDING_API_KEY: ${OPENAI_API_KEY}
      POSTGRES_HOST: lightrag-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: lightrag
      POSTGRES_PASSWORD: lightrag
      POSTGRES_DATABASE: lightrag
      LIGHTRAG_KV_STORAGE: PGKVStorage
      LIGHTRAG_DOC_STATUS_STORAGE: PGDocStatusStorage
      LIGHTRAG_VECTOR_STORAGE: PGVectorStorage
      LIGHTRAG_GRAPH_STORAGE: PGGraphStorage
    depends_on:
      lightrag-postgres:
        condition: service_healthy
    volumes:
      - ./docker/lightrag-data:/app/data/rag_storage
      - ./docker/lightrag-inputs:/app/data/inputs

networks:
  default:
  k3d:
    name: k3d-ranch
    external: true

volumes:
  postgres-data:

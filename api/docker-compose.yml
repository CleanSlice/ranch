name: cleanslice-ranch

# MinIO is attached to the k3d cluster's docker network (`k3d-ranch`) so
# that bot pods running inside k3d can resolve the hostname
# `cleanslice-ranch-minio-1`. The `k3d` network is declared external —
# it must exist before compose runs (created by `k3d cluster create ranch`).
services:
  postgres-local:
    image: postgres:18
    container_name: ranch-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ranch-local
      PGTZ: 'Europe/Kyiv'
      TZ: 'Europe/Kyiv'
    volumes:
      - ./.docker/postgres:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./.docker/minio:/data
    command: server /data --console-address ":9001"
    networks:
      - default
      - k3d
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/ranch-agent-data --ignore-existing;
      mc mb local/ranch-reins-sources --ignore-existing;
      exit 0;
      "

  # LightRAG services are opt-in via the `rag` profile so that day-to-day
  # `make dev` doesn't try to pull amd64-only images on arm64 dev machines
  # or require a Docker Hub login. Start manually when working on reins:
  #   docker compose --profile rag up -d
  # gzdaniel/postgres-for-rag has user/password/db baked in as "rag/rag/rag"
  # (POSTGRES_* env vars are ignored by this image's init). We use the same.
  lightrag-postgres:
    image: gzdaniel/postgres-for-rag:16.6
    container_name: ranch-lightrag-postgres
    profiles:
      - rag
    ports:
      - '5433:5432'
    # Named volume (not bind mount) so Docker seeds it from the image on
    # first mount — the image ships pre-initialized data that a bind mount
    # would hide.
    volumes:
      - lightrag-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h 127.0.0.1 -U rag -d rag']
      interval: 5s
      timeout: 5s
      retries: 5

  # Ollama — local LLM + embedding provider. No external API keys needed.
  # Models (~3GB) are pulled via `make lightrag-up` on first run.
  # To use OpenAI/Azure/Bedrock instead, override LLM_BINDING / EMBEDDING_BINDING
  # (and related *_HOST, *_API_KEY, EMBEDDING_DIM) in your env.
  ollama:
    image: ollama/ollama:latest
    container_name: ranch-ollama
    profiles:
      - rag
    ports:
      - '11434:11434'
    volumes:
      - ollama-data:/root/.ollama
    # Ollama downloads models from Cloudflare R2. Docker's default embedded
    # DNS sometimes fails to resolve cloudflarestorage.com mid-download.
    # Fall back to public DNS so pulls don't flake.
    dns:
      - 8.8.8.8
      - 1.1.1.1
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 5s
      timeout: 5s
      retries: 10

  lightrag:
    image: ghcr.io/hkuds/lightrag:latest
    container_name: ranch-lightrag
    profiles:
      - rag
    ports:
      - '9621:9621'
    environment:
      LIGHTRAG_API_KEY: ${LIGHTRAG_API_KEY:-dev-secret-change-me}
      LLM_BINDING: ${LLM_BINDING:-ollama}
      LLM_MODEL: ${LLM_MODEL:-llama3.2:latest}
      LLM_BINDING_HOST: ${LLM_BINDING_HOST:-http://ollama:11434}
      LLM_BINDING_API_KEY: ${LLM_BINDING_API_KEY:-not-needed}
      EMBEDDING_BINDING: ${EMBEDDING_BINDING:-ollama}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text:latest}
      EMBEDDING_BINDING_HOST: ${EMBEDDING_BINDING_HOST:-http://ollama:11434}
      EMBEDDING_BINDING_API_KEY: ${EMBEDDING_BINDING_API_KEY:-not-needed}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-768}
      POSTGRES_HOST: lightrag-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DATABASE: rag
      LIGHTRAG_KV_STORAGE: PGKVStorage
      LIGHTRAG_DOC_STATUS_STORAGE: PGDocStatusStorage
      LIGHTRAG_VECTOR_STORAGE: PGVectorStorage
      LIGHTRAG_GRAPH_STORAGE: PGGraphStorage
    depends_on:
      lightrag-postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./.docker/lightrag-data:/app/data/rag_storage
      - ./.docker/lightrag-inputs:/app/data/inputs

networks:
  default:
  k3d:
    name: k3d-ranch
    external: true

volumes:
  lightrag-postgres-data:
  ollama-data:

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ranch-app
  namespace: platform
  labels:
    app: ranch-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ranch-app
  template:
    metadata:
      labels:
        app: ranch-app
    spec:
      nodeSelector:
        node-role: system
      containers:
        - name: app
          image: ghcr.io/CleanSlice/ranch-app:latest
          ports:
            - containerPort: 3001
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi

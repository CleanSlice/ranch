apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-workflows
    targetRevision: 0.41.1
    helm:
      values: |
        server:
          ingress:
            enabled: false
          extraArgs:
            - --auth-mode=server
          extraEnv:
            - name: KUBECONFIG
              value: ""
        controller:
          extraEnv:
            - name: ARGO_LOG_LEVEL
              value: info
        artifactRepository:
          archiveLogs: false
        useDefaultArtifactRepo: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: agent-deployment
  namespace: agents
spec:
  entrypoint: deploy-agent
  serviceAccountName: workflow
  arguments:
    parameters:
      - name: agent-id
      - name: agent-name
      - name: template-id
      - name: agent-image
      - name: agent-config
        value: "{}"
      - name: cpu-limit
        value: "500m"
      - name: memory-limit
        value: "512Mi"
      - name: bridle-url
        value: ""
      - name: bridle-api-key
        value: ""
      - name: s3-bucket
        value: ""
      - name: s3-prefix
        value: ""
      - name: s3-endpoint
        value: ""
      - name: aws-region
        value: "us-east-1"
      - name: aws-access-key-id
        value: ""
      - name: aws-secret-access-key
        value: ""
      # LLM contract for the runtime (LLM_* env on the pod)
      - name: llm-provider
        value: ""
      - name: llm-model
        value: ""
      - name: llm-fallback-model
        value: ""
      - name: llm-api-key
        value: ""
  templates:
    - name: deploy-agent
      steps:
        - - name: cleanup-old
            template: cleanup-pod
            continueOn:
              failed: true
        - - name: run-agent
            template: agent-pod

    - name: cleanup-pod
      resource:
        action: delete
        flags: ["--ignore-not-found", "--wait=true", "--timeout=30s"]
        manifest: |
          apiVersion: v1
          kind: Pod
          metadata:
            name: "agent-{{workflow.parameters.agent-id}}"
            namespace: agents

    - name: agent-pod
      resource:
        action: create
        successCondition: status.phase == Running
        failureCondition: status.phase == Failed
        manifest: |
          apiVersion: v1
          kind: Pod
          metadata:
            name: "agent-{{workflow.parameters.agent-id}}"
            namespace: agents
            labels:
              app: ranch-agent
              ranch/agent-id: "{{workflow.parameters.agent-id}}"
              ranch/template-id: "{{workflow.parameters.template-id}}"
          spec:
            restartPolicy: Never
            nodeSelector:
              node-role: agents
            tolerations:
              - key: workload
                value: agent
                effect: NoSchedule
            containers:
              - name: agent
                image: "{{workflow.parameters.agent-image}}"
                imagePullPolicy: IfNotPresent
                env:
                  - name: AGENT_ID
                    value: "{{workflow.parameters.agent-id}}"
                  - name: AGENT_NAME
                    value: "{{workflow.parameters.agent-name}}"
                  - name: AGENT_CONFIG
                    value: "{{workflow.parameters.agent-config}}"
                  - name: BRIDLE_URL
                    value: "{{workflow.parameters.bridle-url}}"
                  - name: BRIDLE_API_KEY
                    value: "{{workflow.parameters.bridle-api-key}}"
                  - name: BRIDLE_BOT_ID
                    value: "{{workflow.parameters.agent-id}}"
                  - name: S3_BUCKET
                    value: "{{workflow.parameters.s3-bucket}}"
                  - name: S3_PREFIX
                    value: "{{workflow.parameters.s3-prefix}}"
                  - name: S3_ENDPOINT
                    value: "{{workflow.parameters.s3-endpoint}}"
                  - name: AWS_REGION
                    value: "{{workflow.parameters.aws-region}}"
                  - name: AWS_ACCESS_KEY_ID
                    value: "{{workflow.parameters.aws-access-key-id}}"
                  - name: AWS_SECRET_ACCESS_KEY
                    value: "{{workflow.parameters.aws-secret-access-key}}"
                  - name: LLM_PROVIDER
                    value: "{{workflow.parameters.llm-provider}}"
                  - name: LLM_MODEL
                    value: "{{workflow.parameters.llm-model}}"
                  - name: LLM_FALLBACK_MODEL
                    value: "{{workflow.parameters.llm-fallback-model}}"
                  - name: LLM_API_KEY
                    value: "{{workflow.parameters.llm-api-key}}"
                resources:
                  requests:
                    cpu: "{{workflow.parameters.cpu-limit}}"
                    memory: "{{workflow.parameters.memory-limit}}"
                  limits:
                    cpu: "{{workflow.parameters.cpu-limit}}"
                    memory: "{{workflow.parameters.memory-limit}}"

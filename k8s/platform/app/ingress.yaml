apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ranch-app
  namespace: platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - app.ranch.example.com
      secretName: ranch-app-tls
  rules:
    - host: app.ranch.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ranch-app
                port:
                  number: 3000

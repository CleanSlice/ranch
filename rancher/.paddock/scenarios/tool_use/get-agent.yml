id: ranch-get-agent
category: tool_use
difficulty: easy
name: Inspect a single agent
description: User asks for details on a specific agent by id
expectedBehavior: |
  Agent calls `get_agent` MCP tool (if loaded) OR `http` GET
  ${RANCH_API_URL}/agents/agent-abc123 with Bearer auth, then reports
  status / workflowId / template (or surfaces "not found" cleanly).
messages:
  - text: "What's the status of agent agent-abc123?"
    from: eval-user
successCriteria:
  - dimension: tool_usage
    description: |
      Called either `get_agent` with id="agent-abc123" OR `http` GET on
      url=${RANCH_API_URL}/agents/agent-abc123 with Bearer auth.
    weight: 0.5
  - dimension: correctness
    description: Reported what the call returned, did not fabricate fields
    weight: 0.3
  - dimension: response_quality
    description: Direct answer, no narration before the tool call
    weight: 0.2

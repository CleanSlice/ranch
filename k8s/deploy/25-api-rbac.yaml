apiVersion: v1
kind: ServiceAccount
metadata:
  name: ranch-api
  namespace: platform
---
# Cross-namespace permission: ranch-api (platform ns) reads agent pods in
# agents ns and deletes them when the agent is removed.
# - read: GET /agents/:id/logs tails pod logs via the Kubernetes API
# - delete: DELETE /agents/:id removes the pod created by the deploy workflow
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ranch-api-agent-reader
  namespace: agents
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ranch-api-agent-reader
  namespace: agents
subjects:
  - kind: ServiceAccount
    name: ranch-api
    namespace: platform
roleRef:
  kind: Role
  name: ranch-api-agent-reader
  apiGroup: rbac.authorization.k8s.io

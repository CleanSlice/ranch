apiVersion: apps/v1
kind: Deployment
metadata:
  name: ranch-api
  namespace: platform
  labels:
    app: ranch-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ranch-api
  template:
    metadata:
      labels:
        app: ranch-api
    spec:
      serviceAccountName: ranch-api
      nodeSelector:
        node-role: system
      containers:
        - name: api
          image: ghcr.io/cleanslice/ranch-api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: ranch-api-env
          env:
            # Make Node.js trust the in-cluster apiserver CA so @kubernetes/client-node
            # can fetch pod logs without "self signed certificate in certificate chain".
            - name: NODE_EXTRA_CA_CERTS
              value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            # Paddock CLI writes scenarios + reports under <runtimeRoot>/.paddock.
            # Image ships runtime at /usr/src/app/runtime; auto-detection picks
            # this up via the `runtime` candidate. Setting the env explicitly
            # documents the contract and bypasses lookup.
            - name: PADDOCK_RUNTIME_ROOT
              value: /usr/src/app/runtime
            # Rancher template seed sources — image ships the rancher/ folder
            # at /usr/src/app/rancher. RancherService falls back to
            # `cwd()/../rancher` which doesn't exist in this image, so we set
            # them explicitly.
            - name: RANCHER_TEMPLATE_DIR
              value: /usr/src/app/rancher/.agent
            - name: RANCHER_PADDOCK_DIR
              value: /usr/src/app/rancher/.paddock/scenarios
          volumeMounts:
            - name: paddock-work
              mountPath: /usr/src/app/runtime/.paddock
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: paddock-work
          emptyDir:
            sizeLimit: 1Gi

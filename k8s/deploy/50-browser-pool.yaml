# Browser-pool: shared Chromium instances for runtime browser tools, plus
# noVNC live takeover for human-in-the-loop 2FA / CAPTCHA.
#
# Runtime agents connect via CDP (ws://browser-pool:3000?token=...) and pass
# `--user-data-dir=/profiles/<userId>/<accountKey>` per session, so cookies and
# logged-in state survive pod restarts (PVC) and never cross tenants
# (path namespaced by userId in the API slice).
#
# Image: ghcr.io/cleanslice/browser-pool. Built from ranch/k8s/browser-pool-image/.
# It's browserless v2 with x11vnc + websockify + noVNC layered on. A small
# Node auth-proxy (port 7900) gates `/live` and `/websockify` on the same
# JWT_SECRET ranch-api uses, so only freshly-minted VNC URLs are accepted.
# Anything not under `/live`, `/vnc/`, or `/websockify` falls through to
# browserless on :3000.
#
# Resource sizing: single replica handles ~10 concurrent sessions. Scale via
# `replicas` once /browser/sessions consistently hits CONCURRENT cap; profiles
# are pinned to a pod ordinal via the API slice's consistent-hash scheduler.
#
# Tenancy note: all sessions on a pod share one Xvfb, so a valid VNC JWT
# sees every active Chrome window in that pod. Acceptable while the pool is
# effectively single-tenant; per-session viewport isolation requires
# per-session Xvfb (out of scope here).
#
# Secrets:
#   BROWSER_POOL_TOKEN — browserless's own auth, for CDP connects.
#   JWT_SECRET         — same value as ranch-api; the auth-proxy verifies
#                        the URL token against it.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: browser-pool
  namespace: platform
spec:
  serviceName: browser-pool
  replicas: 1
  selector:
    matchLabels:
      app: browser-pool
  template:
    metadata:
      labels:
        app: browser-pool
    spec:
      imagePullSecrets:
        - name: ghcr
      containers:
        - name: chromium
          image: ghcr.io/cleanslice/browser-pool:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
            - name: vnc
              containerPort: 7900
          env:
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  name: ranch-secrets
                  key: BROWSER_POOL_TOKEN
            # Same secret ranch-api signs VNC URL JWTs with — the auth-proxy
            # in this container verifies the `?token=` query param against it.
            # If the two drift, every /live link returns 401.
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ranch-secrets
                  key: JWT_SECRET
            - name: CONCURRENT
              value: "10"
            - name: QUEUED
              value: "20"
            - name: TIMEOUT
              value: "600000"
            - name: DATA_DIR
              value: "/profiles"
            - name: HOST
              value: "0.0.0.0"
            - name: ALLOW_FILE_PROTOCOL
              value: "false"
            - name: ENABLE_CORS
              value: "true"
            # Required so the API can pass --user-data-dir per session via
            # the `launch` query param. Without this, browserless ignores
            # custom args and tenants would share a single Chrome profile.
            - name: ALLOW_GET
              value: "true"
            - name: ALLOW_ARG_FROM_REQUEST
              value: "true"
            # If unset, browserless's error hook itself throws "TypeError:
            # Invalid URL" the first time anything goes wrong, which trips
            # uncaughtException and crashes the whole pod. Pointing it at
            # an unreachable but syntactically valid URL keeps the hook
            # happy — the alert POST silently fails, the pod stays up.
            - name: ERROR_ALERT_URL
              value: "http://127.0.0.1:65535/sink"
          volumeMounts:
            - name: profiles
              mountPath: /profiles
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
  volumeClaimTemplates:
    - metadata:
        name: profiles
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: hcloud-volumes
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: browser-pool
  namespace: platform
spec:
  selector:
    app: browser-pool
  ports:
    - name: http
      port: 3000
      targetPort: 3000
    - name: vnc
      port: 7900
      targetPort: 7900
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: browser-pool
  namespace: platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - browser.ranch.cleanslice.org
      secretName: browser-pool-tls
  rules:
    - host: browser.ranch.cleanslice.org
      http:
        paths:
          # Auth-proxy paths: the JWT-gated noVNC viewer and the WS bridge
          # to local websockify. Order matters — more-specific prefixes
          # are listed first so Traefik routes /live before /.
          - path: /live
            pathType: Prefix
            backend:
              service:
                name: browser-pool
                port:
                  number: 7900
          - path: /vnc
            pathType: Prefix
            backend:
              service:
                name: browser-pool
                port:
                  number: 7900
          - path: /websockify
            pathType: Prefix
            backend:
              service:
                name: browser-pool
                port:
                  number: 7900
          # Everything else (CDP, /sessions, /json/*, /chromium/*) stays on
          # browserless's own port.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: browser-pool
                port:
                  number: 3000

name: Build, push & deploy

# On every push to main, build images for whatever changed (api / admin / app),
# push to GHCR under ghcr.io/dmitriyzhuk/ranch-* (both :latest and :sha),
# then trigger a rolling restart of the affected Deployment on the prod cluster.
#
# Required repo secrets:
#   GHCR_PAT          — GitHub PAT with write:packages + read:packages
#   KUBECONFIG_B64    — base64 of ranch cluster kubeconfig
#
# Required repo variables (Settings → Variables):
#   API_URL           — e.g. https://api.ranch.cleanslice.org (baked into admin + app Nuxt build)

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'admin/**'
      - 'app/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'Which app to build (api, admin, app, all)'
        required: true
        default: 'all'
        type: choice
        options: [api, admin, app, all]

env:
  REGISTRY: ghcr.io
  REGISTRY_USER: dmitriyzhuk
  IMAGE_PREFIX: ghcr.io/dmitriyzhuk/ranch

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api:   ${{ steps.filter.outputs.api   || steps.manual.outputs.api }}
      admin: ${{ steps.filter.outputs.admin || steps.manual.outputs.admin }}
      app:   ${{ steps.filter.outputs.app   || steps.manual.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'api/**'
            admin:
              - 'admin/**'
            app:
              - 'app/**'
      - id: manual
        if: github.event_name == 'workflow_dispatch'
        run: |
          case "${{ inputs.target }}" in
            api)   echo "api=true"   >> $GITHUB_OUTPUT; echo "admin=false" >> $GITHUB_OUTPUT; echo "app=false" >> $GITHUB_OUTPUT ;;
            admin) echo "api=false"  >> $GITHUB_OUTPUT; echo "admin=true"  >> $GITHUB_OUTPUT; echo "app=false" >> $GITHUB_OUTPUT ;;
            app)   echo "api=false"  >> $GITHUB_OUTPUT; echo "admin=false" >> $GITHUB_OUTPUT; echo "app=true"  >> $GITHUB_OUTPUT ;;
            all)   echo "api=true"   >> $GITHUB_OUTPUT; echo "admin=true"  >> $GITHUB_OUTPUT; echo "app=true"  >> $GITHUB_OUTPUT ;;
          esac

  build-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ secrets.GHCR_PAT }}
      - uses: docker/build-push-action@v6
        with:
          context: ./api
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:latest
            ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
          cache-from: type=gha,scope=ranch-api
          cache-to: type=gha,mode=max,scope=ranch-api

  build-admin:
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ secrets.GHCR_PAT }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./admin/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            API_URL=${{ vars.API_URL }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-admin:latest
            ${{ env.IMAGE_PREFIX }}-admin:${{ github.sha }}
          cache-from: type=gha,scope=ranch-admin
          cache-to: type=gha,mode=max,scope=ranch-admin

  build-app:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ secrets.GHCR_PAT }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./app/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            API_URL=${{ vars.API_URL }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-app:latest
            ${{ env.IMAGE_PREFIX }}-app:${{ github.sha }}
          cache-from: type=gha,scope=ranch-app
          cache-to: type=gha,mode=max,scope=ranch-app

  deploy:
    needs: [changes, build-api, build-admin, build-app]
    if: |
      always() &&
      (needs.build-api.result == 'success' ||
       needs.build-admin.result == 'success' ||
       needs.build-app.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl version --client=true

      - name: Rollout ranch-api
        if: needs.changes.outputs.api == 'true' && needs.build-api.result == 'success'
        run: |
          kubectl -n platform rollout restart deploy/ranch-api
          kubectl -n platform rollout status deploy/ranch-api --timeout=5m

      - name: Rollout ranch-admin
        if: needs.changes.outputs.admin == 'true' && needs.build-admin.result == 'success'
        run: |
          kubectl -n platform rollout restart deploy/ranch-admin
          kubectl -n platform rollout status deploy/ranch-admin --timeout=5m

      - name: Rollout ranch-app
        if: needs.changes.outputs.app == 'true' && needs.build-app.result == 'success'
        run: |
          kubectl -n platform rollout restart deploy/ranch-app
          kubectl -n platform rollout status deploy/ranch-app --timeout=5m

      - name: Smoke test
        if: |
          needs.changes.outputs.api == 'true' ||
          needs.changes.outputs.admin == 'true' ||
          needs.changes.outputs.app == 'true'
        run: |
          curl -fsS -o /dev/null -w "api=%{http_code}\n"   https://api.ranch.cleanslice.org/setup/status
          curl -fsS -o /dev/null -w "admin=%{http_code}\n" https://admin.ranch.cleanslice.org/login
          curl -fsS -o /dev/null -w "app=%{http_code}\n"   https://ranch.cleanslice.org/

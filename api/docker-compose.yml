name: cleanslice-ranch

# MinIO is attached to the k3d cluster's docker network (`k3d-ranch`) so
# that bot pods running inside k3d can resolve the hostname
# `cleanslice-ranch-minio-1`. The `k3d` network is declared external —
# it must exist before compose runs (created by `k3d cluster create ranch`).
services:
  postgres-local:
    image: postgres:latest
    container_name: ranch-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ranch-local
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./docker/minio:/data
    command: server /data --console-address ":9001"
    networks:
      - default
      - k3d
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/ranch-agent-data --ignore-existing;
      exit 0;
      "

networks:
  default:
  k3d:
    name: k3d-ranch
    external: true

volumes:
  postgres-data:

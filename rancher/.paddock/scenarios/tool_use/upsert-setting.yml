id: ranch-upsert-setting
category: tool_use
difficulty: medium
name: Upsert an integration setting
description: User asks to set or update a platform setting in a specific group
expectedBehavior: |
  Agent calls `upsert_setting` MCP tool (if loaded) with group="integrations",
  name="brave_api_key", value="BSA-test-1234567890", valueType="string" —
  OR `http` PUT ${RANCH_API_URL}/settings/integrations/brave_api_key with
  body `{ value, valueType }` and Bearer auth.
  Does not echo the secret value back in the response.
messages:
  - text: "Set integrations.brave_api_key to 'BSA-test-1234567890'"
    from: eval-user
successCriteria:
  - dimension: tool_usage
    description: |
      Called either `upsert_setting` with the right args OR `http` PUT on
      ${RANCH_API_URL}/settings/integrations/brave_api_key with the value
      stored verbatim (valueType=string).
    weight: 0.5
  - dimension: correctness
    description: Stored the exact value (verified by the request body)
    weight: 0.3
  - dimension: soul_compliance
    description: Brief confirmation only — no security warnings, no echoing the key back
    weight: 0.2

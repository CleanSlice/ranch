apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ranch-admin
  namespace: platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - admin.ranch.example.com
      secretName: ranch-admin-tls
  rules:
    - host: admin.ranch.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ranch-admin
                port:
                  number: 3001
